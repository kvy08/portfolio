<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-config="personal.name">Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="config.js"></script>
  <style>
    /* ════════════════════════════════════════════════════════════
   GLASSPUNK — A collision of Futuristic Glassmorphism
   and Neo-Brutalist rawness. Refined chaos.
   Palette: Near-black void + Electric Cyan + Acid Orange + Ghost White
   ════════════════════════════════════════════════════════════ */

    :root {
      /* Core Palette */
      --void: #06070A;
      --void2: #0C0E14;
      --void3: #12151E;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-md: rgba(255, 255, 255, 0.07);
      --glass-hi: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.08);
      --border-hi: rgba(255, 255, 255, 0.18);

      /* Accent System */
      --cyan: #00F5FF;
      --cyan-dim: rgba(0, 245, 255, 0.15);
      --orange: #FF5C00;
      --orange-dim: rgba(255, 92, 0, 0.15);
      --lime: #BCFF00;
      --lime-dim: rgba(188, 255, 0, 0.1);

      /* Type */
      --white: #F0F2F5;
      --grey: #5A6070;
      --grey-lt: #8B95A6;

      /* Fonts */
      --f-display: 'Bebas Neue', sans-serif;
      --f-body: 'DM Sans', sans-serif;
      --f-code: 'Fira Code', monospace;

      /* Geometry */
      --r-sm: 8px;
      --r-md: 16px;
      --r-lg: 24px;

      /* Brutal shadow */
      --brutal: 4px 4px 0px rgba(0, 245, 255, 0.6);
      --brutal-orange: 4px 4px 0px var(--orange);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--void);
      color: var(--white);
      font-family: var(--f-body);
      font-size: 15px;
      line-height: 1.65;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── Custom Cursor ───────────────────────────────────────── */
    #cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      background: var(--cyan);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.08s, width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: difference;
    }

    #cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(0, 245, 255, 0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.18s ease-out, width 0.25s, height 0.25s, border-color 0.2s;
    }

    body:has(a:hover) #cursor {
      width: 20px;
      height: 20px;
      background: var(--orange);
    }

    body:has(a:hover) #cursor-ring {
      width: 52px;
      height: 52px;
      border-color: var(--orange);
    }

    /* ── Ambient background orbs ─────────────────────────────── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 245, 255, 0.3), transparent);
      top: -200px;
      left: -100px;
      animation: orbFloat 12s ease-in-out infinite;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 92, 0, 0.25), transparent);
      bottom: 10%;
      right: -150px;
      animation: orbFloat 15s ease-in-out infinite reverse;
    }

    .orb-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(188, 255, 0, 0.12), transparent);
      top: 50%;
      left: 40%;
      animation: orbFloat 18s ease-in-out infinite 3s;
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(40px, -30px) scale(1.05);
      }

      66% {
        transform: translate(-20px, 20px) scale(0.95);
      }
    }

    /* ── Noise grain ─────────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 998;
    }

    /* ── Navigation ──────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 6vw;
      background: rgba(6, 7, 10, 0.7);
      backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--f-display);
      font-size: 24px;
      letter-spacing: 2px;
      color: var(--white);
      text-decoration: none;
    }

    .nav-logo em {
      color: var(--cyan);
      font-style: normal;
    }

    .nav-pill {
      display: flex;
      gap: 4px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px;
    }

    .nav-pill a {
      color: var(--grey-lt);
      text-decoration: none;
      font-size: 12px;
      font-family: var(--f-code);
      padding: 7px 18px;
      border-radius: 100px;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .nav-pill a:hover {
      background: var(--glass-hi);
      color: var(--white);
    }

    .nav-hire {
      font-family: var(--f-code);
      font-size: 12px;
      color: var(--void);
      background: var(--cyan);
      border: none;
      padding: 10px 22px;
      border-radius: 100px;
      cursor: none;
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .nav-hire:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 245, 255, 0.4);
    }

    /* ── Section shell ───────────────────────────────────────── */
    .section-wrap {
      position: relative;
      z-index: 1;
      padding: 130px 6vw;
      max-width: 1380px;
      margin: 0 auto;
    }

    .eyebrow {
      font-family: var(--f-code);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .eyebrow::after {
      content: '';
      flex: 0 0 40px;
      height: 1px;
      background: var(--cyan);
      opacity: 0.5;
    }

    .section-title {
      font-family: var(--f-display);
      font-size: clamp(48px, 7vw, 88px);
      letter-spacing: 2px;
      line-height: 0.95;
      margin-bottom: 72px;
    }

    /* ══════════════════════════════════════════════════════════
   HERO
   ══════════════════════════════════════════════════════════ */
    #hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 480px;
      align-items: center;
      gap: 80px;
      padding: 140px 6vw 80px;
      max-width: 1380px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Available badge */
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(188, 255, 0, 0.08);
      border: 1px solid rgba(188, 255, 0, 0.25);
      color: var(--lime);
      font-family: var(--f-code);
      font-size: 11px;
      letter-spacing: 0.15em;
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 28px;
      width: fit-content;
      animation: heroFade 0.5s ease both;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--lime);
      animation: badgePulse 2.5s infinite;
    }

    @keyframes badgePulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(188, 255, 0, 0.6);
      }

      50% {
        box-shadow: 0 0 0 6px rgba(188, 255, 0, 0);
      }
    }

    /* Hero headline */
    .hero-headline {
      font-family: var(--f-display);
      font-size: clamp(64px, 9vw, 128px);
      line-height: 0.88;
      letter-spacing: 3px;
      margin-bottom: 12px;
      animation: heroFade 0.5s 0.1s ease both;
      position: relative;
    }

    .hero-headline .line-ghost {
      /* Outlined stroke text — brutalist touch */
      -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.15);
      -webkit-text-fill-color: transparent;
      display: block;
    }

    .hero-headline .line-solid {
      display: block;
      color: var(--white);
    }

    .hero-headline .line-accent {
      display: block;
      color: var(--cyan);
    }

    /* Rotating role text */
    .hero-role-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      animation: heroFade 0.5s 0.2s ease both;
    }

    .role-slash {
      font-family: var(--f-display);
      font-size: 28px;
      color: var(--orange);
      opacity: 0.7;
    }

    #hero-role {
      font-family: var(--f-code);
      font-size: 14px;
      color: var(--grey-lt);
      letter-spacing: 0.1em;
    }

    #hero-role span {
      color: var(--orange);
    }

    .hero-bio {
      font-size: 16px;
      color: var(--grey-lt);
      max-width: 520px;
      line-height: 1.85;
      margin-bottom: 48px;
      animation: heroFade 0.5s 0.3s ease both;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      animation: heroFade 0.5s 0.4s ease both;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--cyan);
      color: var(--void);
      font-family: var(--f-code);
      font-size: 13px;
      font-weight: 500;
      padding: 14px 30px;
      border-radius: var(--r-sm);
      text-decoration: none;
      border: none;
      cursor: none;
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.04em;
      /* Brutal edge */
      box-shadow: var(--brutal);
    }

    .btn-primary:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px rgba(0, 245, 255, 0.8);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      font-family: var(--f-code);
      font-size: 13px;
      padding: 14px 30px;
      border-radius: var(--r-sm);
      text-decoration: none;
      border: 1px solid var(--border-hi);
      cursor: none;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }

    .btn-outline:hover {
      border-color: var(--orange);
      color: var(--orange);
      box-shadow: var(--brutal-orange);
      transform: translate(-2px, -2px);
    }

    /* Scroll indicator */
    .hero-scroll {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 64px;
      color: var(--grey);
      font-family: var(--f-code);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: heroFade 0.5s 0.6s ease both;
    }

    .scroll-line {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, var(--cyan), transparent);
    }

    /* ── Profile card — 3D glassmorphism ─────────────────────── */
    .profile-stage {
      perspective: 1000px;
      animation: heroFade 0.5s 0.25s ease both;
    }

    .profile-3d {
      transform-style: preserve-3d;
      transition: transform 0.12s ease-out;
      position: relative;
    }

    .profile-glass {
      background: var(--glass-md);
      backdrop-filter: blur(32px) saturate(200%);
      border: 1px solid var(--border-hi);
      border-radius: var(--r-lg);
      padding: 48px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .profile-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.06) 0%, transparent 50%, rgba(255, 92, 0, 0.04) 100%);
      pointer-events: none;
    }

    /* Glitch corner decorations */
    .profile-glass::after {
      content: '';
      position: absolute;
      top: 12px;
      right: 12px;
      width: 48px;
      height: 48px;
      border-top: 2px solid var(--cyan);
      border-right: 2px solid var(--cyan);
      opacity: 0.5;
    }

    .corner-bl {
      position: absolute;
      bottom: 12px;
      left: 12px;
      width: 48px;
      height: 48px;
      border-bottom: 2px solid var(--orange);
      border-left: 2px solid var(--orange);
      opacity: 0.5;
    }

    /* Profile image — grayscale → color on hover */
    .profile-img-wrap {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }

    .profile-img-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--cyan), var(--orange), var(--lime), var(--cyan));
      animation: spinGrad 4s linear infinite;
      z-index: 0;
    }

    @keyframes spinGrad {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .profile-img-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(255, 92, 0, 0.2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      overflow: hidden;
      border: 3px solid var(--void2);
    }

    .profile-img-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) brightness(0.9);
      transition: filter 0.5s ease;
    }

    .profile-glass:hover .profile-img-inner img {
      filter: grayscale(0%) brightness(1);
    }

    .profile-name-display {
      text-align: center;
    }

    .profile-name-big {
      font-family: var(--f-display);
      font-size: 40px;
      letter-spacing: 4px;
      line-height: 1;
      color: var(--white);
    }

    .profile-name-big span {
      color: var(--cyan);
    }

    .profile-role-tag {
      font-family: var(--f-code);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey-lt);
      margin-top: 6px;
    }

    .profile-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-hi), transparent);
    }

    .profile-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }

    .meta-chip {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 14px;
      text-align: center;
    }

    .meta-chip .mc-label {
      font-size: 10px;
      color: var(--grey);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .meta-chip .mc-val {
      font-family: var(--f-code);
      font-size: 14px;
      color: var(--white);
      font-weight: 500;
    }

    /* ═══════════════════════════════════════════════════════════
   STATS DASHBOARD
   ═══════════════════════════════════════════════════════════ */
    #stats {
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      /* Neo-brutalist box shadow */
      box-shadow: 6px 6px 0 rgba(0, 245, 255, 0.3);
    }

    .stat-block {
      background: var(--void2);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      position: relative;
      transition: background 0.3s;
      overflow: hidden;
    }

    .stat-block:hover {
      background: var(--void3);
    }

    .stat-block::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--stat-color, var(--cyan));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .stat-block:hover::after {
      transform: scaleX(1);
    }

    .stat-icon-wrap {
      font-size: 28px;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
    }

    .stat-number {
      font-family: var(--f-display);
      font-size: 72px;
      line-height: 1;
      letter-spacing: -1px;
      color: var(--white);
      /* Counter animation target */
    }

    .stat-number .stat-accent {
      color: var(--stat-color, var(--cyan));
    }

    .stat-label {
      font-family: var(--f-code);
      font-size: 11px;
      color: var(--grey-lt);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ═══════════════════════════════════════════════════════════
   TECH STACK GRID
   ═══════════════════════════════════════════════════════════ */
    #techstack {
      border-top: 1px solid var(--border);
    }

    .tech-filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .filter-btn {
      font-family: var(--f-code);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--grey-lt);
      cursor: none;
      transition: all 0.2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--cyan-dim);
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .tech-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
    }

    .tech-cell {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: none;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .tech-cell::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, var(--glow-color, rgba(0, 245, 255, 0.1)), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tech-cell:hover::before {
      opacity: 1;
    }

    .tech-cell:hover {
      border-color: var(--glow-color, rgba(0, 245, 255, 0.5));
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 0 24px var(--glow-color, rgba(0, 245, 255, 0.2));
    }

    .tech-cell.hidden {
      display: none;
    }

    .tech-icon {
      font-size: 32px;
      line-height: 1;
      transition: transform 0.25s;
    }

    .tech-icon img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      display: block;
    }

    .tech-cell:hover .tech-icon {
      transform: scale(1.2);
    }

    .tech-name {
      font-family: var(--f-code);
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--grey-lt);
      text-align: center;
      line-height: 1.3;
      transition: color 0.25s;
    }

    .tech-cell:hover .tech-name {
      color: var(--white);
    }

    /* ═══════════════════════════════════════════════════════════
   PROJECTS
   ═══════════════════════════════════════════════════════════ */
    #projects {
      border-top: 1px solid var(--border);
    }

    .projects-layout {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 16px;
    }

    /* Featured = spans 2 cols */
    .project-card {
      background: var(--void2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 36px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      cursor: none;
    }

    .project-card.featured {
      grid-column: span 1;
    }

    .project-card:hover {
      transform: translate(-3px, -3px);
      border-color: var(--card-accent, rgba(0, 245, 255, 0.4));
      box-shadow: 4px 4px 0 var(--card-accent, rgba(0, 245, 255, 0.3));
    }

    /* Ambient card glow */
    .project-card::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, var(--card-accent, rgba(0, 245, 255, 0.12)), transparent 70%);
      pointer-events: none;
      transition: opacity 0.3s;
      opacity: 0;
    }

    .project-card:hover::before {
      opacity: 1;
    }

    /* Top accent line */
    .project-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--card-accent, var(--cyan));
    }

    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .project-icon-box {
      font-size: 36px;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--glass-md);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      transition: transform 0.3s;
    }

    .project-card:hover .project-icon-box {
      transform: rotate(-6deg) scale(1.1);
    }

    .project-meta-top {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .project-year {
      font-family: var(--f-code);
      font-size: 11px;
      color: var(--grey);
    }

    .project-tag {
      font-family: var(--f-code);
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid var(--card-accent, rgba(0, 245, 255, 0.3));
      color: var(--card-accent, var(--cyan));
      text-transform: uppercase;
    }

    .project-title {
      font-family: var(--f-display);
      font-size: 32px;
      letter-spacing: 1px;
      line-height: 1;
      color: var(--white);
    }

    .project-card.featured .project-title {
      font-size: 44px;
    }

    .qa-block {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .qa-label {
      font-family: var(--f-code);
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 2px 0;
      margin-bottom: 2px;
    }

    .qa-label.problem {
      color: var(--orange);
    }

    .qa-label.solution {
      color: var(--lime);
    }

    .qa-text {
      font-size: 13px;
      color: var(--grey-lt);
      line-height: 1.7;
    }

    .project-card.featured .qa-text {
      font-size: 14px;
    }

    .project-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .tech-pill {
      font-family: var(--f-code);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--grey-lt);
      letter-spacing: 0.04em;
    }

    /* ═══════════════════════════════════════════════════════════
   TIMELINE
   ═══════════════════════════════════════════════════════════ */
    #timeline {
      border-top: 1px solid var(--border);
    }

    .timeline-rail {
      position: relative;
      padding-left: 60px;
    }

    .timeline-rail::before {
      content: '';
      position: absolute;
      left: 14px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--cyan), var(--orange), transparent);
    }

    .tl-item {
      position: relative;
      margin-bottom: 80px;
      opacity: 0;
      transform: translateX(-24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .tl-item.visible {
      opacity: 1;
      transform: translateX(0);
    }

    /* Timeline node */
    .tl-node {
      position: absolute;
      left: -54px;
      top: 10px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--void2);
      border: 2px solid var(--cyan);
      box-shadow: 0 0 16px rgba(0, 245, 255, 0.5), 0 0 40px rgba(0, 245, 255, 0.2);
      transition: transform 0.3s;
    }

    .tl-item:hover .tl-node {
      transform: scale(1.4);
    }

    .tl-period {
      font-family: var(--f-code);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 10px;
    }

    .tl-role {
      font-family: var(--f-display);
      font-size: clamp(36px, 4vw, 56px);
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .tl-company {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--f-code);
      font-size: 13px;
      color: var(--orange);
      margin-bottom: 20px;
    }

    .tl-company::before {
      content: '↳';
    }

    .tl-desc {
      font-size: 14px;
      color: var(--grey-lt);
      max-width: 560px;
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .tl-milestones {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tl-ms {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 13px;
      color: var(--white);
    }

    .tl-ms::before {
      content: '▸';
      color: var(--cyan);
      flex-shrink: 0;
      font-size: 10px;
      margin-top: 4px;
    }

    /* ═══════════════════════════════════════════════════════════
   EDUCATION & CERTS
   ═══════════════════════════════════════════════════════════ */
    #education {
      border-top: 1px solid var(--border);
    }

    .edu-cert-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    .subsection-head {
      font-family: var(--f-code);
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--grey);
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .edu-card-glass {
      background: var(--glass-md);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-hi);
      border-radius: var(--r-lg);
      padding: 40px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .edu-card-glass::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--lime));
    }

    .edu-degree-name {
      font-family: var(--f-display);
      font-size: 36px;
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .edu-field-name {
      color: var(--cyan);
      font-family: var(--f-code);
      font-size: 12px;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
    }

    .edu-attrs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .edu-attr {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 16px;
      font-family: var(--f-code);
      font-size: 12px;
      color: var(--grey-lt);
    }

    .edu-attr span {
      color: var(--white);
    }

    .cert-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cert-row {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px 20px;
      transition: all 0.25s;
      cursor: default;
    }

    .cert-row:hover {
      background: var(--glass-md);
      border-color: var(--border-hi);
      transform: translateX(6px);
    }

    .cert-icon-box {
      width: 44px;
      height: 44px;
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: var(--glass-md);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .cert-info {
      flex: 1;
    }

    .cert-title-text {
      font-family: var(--f-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--white);
      margin-bottom: 2px;
    }

    .cert-issuer-text {
      font-family: var(--f-code);
      font-size: 11px;
      color: var(--grey-lt);
    }

    .cert-year-badge {
      font-family: var(--f-code);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 100px;
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--grey-lt);
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════════════════
   CONTACT
   ═══════════════════════════════════════════════════════════ */
    #contact {
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    .contact-bg-text {
      position: absolute;
      font-family: var(--f-display);
      font-size: clamp(160px, 20vw, 280px);
      letter-spacing: 10px;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255, 255, 255, 0.04);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }

    .contact-inner {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .contact-title {
      font-family: var(--f-display);
      font-size: clamp(56px, 10vw, 120px);
      line-height: 0.9;
      letter-spacing: 3px;
      margin-bottom: 32px;
    }

    .contact-title .cta-accent {
      color: var(--cyan);
    }

    .contact-sub {
      font-size: 16px;
      color: var(--grey-lt);
      max-width: 500px;
      margin: 0 auto 56px;
      line-height: 1.8;
    }

    .contact-cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      color: var(--white);
      font-family: var(--f-display);
      font-size: 28px;
      letter-spacing: 3px;
      padding: 22px 56px;
      border-radius: var(--r-sm);
      text-decoration: none;
      border: 2px solid var(--cyan);
      cursor: none;
      transition: all 0.25s;
      box-shadow: var(--brutal);
      position: relative;
      overflow: hidden;
    }

    .contact-cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--cyan);
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.77, 0, 0.18, 1);
      z-index: -1;
    }

    .contact-cta-btn:hover::before {
      transform: translateX(0);
    }

    .contact-cta-btn:hover {
      color: var(--void);
      transform: translate(-3px, -3px);
      box-shadow: 6px 6px 0 var(--cyan);
    }

    .contact-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 56px;
      flex-wrap: wrap;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--grey-lt);
      font-family: var(--f-code);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-decoration: none;
      padding: 10px 22px;
      border: 1px solid var(--border);
      border-radius: 100px;
      transition: all 0.2s;
    }

    .contact-link:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    /* ── Footer ───────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 6vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1380px;
      margin: 0 auto;
      font-family: var(--f-code);
      font-size: 11px;
      color: var(--grey);
      letter-spacing: 0.08em;
      position: relative;
      z-index: 1;
    }

    footer a {
      color: var(--cyan);
      text-decoration: none;
    }

    /* ── Animations / utilities ──────────────────────────────── */
    @keyframes heroFade {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-up {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 1024px) {
      #hero {
        grid-template-columns: 1fr;
      }

      .profile-stage {
        display: none;
      }

      .projects-layout {
        grid-template-columns: 1fr 1fr;
      }

      .project-card.featured {
        grid-column: span 2;
      }

      .stats-strip {
        grid-template-columns: 1fr 1fr;
      }

      .edu-cert-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .nav-pill {
        display: none;
      }

      .projects-layout {
        grid-template-columns: 1fr;
      }

      .project-card.featured {
        grid-column: span 1;
      }

      .stats-strip {
        grid-template-columns: 1fr;
      }

      .tech-grid {
        grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      }
    }

    ::-webkit-scrollbar {
      width: 3px;
    }

    ::-webkit-scrollbar-track {
      background: var(--void);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--cyan);
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <!-- Custom cursor -->
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <!-- Ambient bg -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- ── NAV ──────────────────────────────────────────────────── -->
  <nav>
    <a href="#hero" class="nav-logo" id="nav-logo">K<em>.</em>Y</a>
    <div class="nav-pill">
      <a href="#techstack">Stack</a>
      <a href="#projects">Work</a>
      <a href="#timeline">Timeline</a>
      <a href="#education">Education</a>
    </div>
    <a href="#contact" class="nav-hire">Hire Me ↗</a>
  </nav>

  <!-- ══════════════════════════════════════════════════════════
     HERO
══════════════════════════════════════════════════════════ -->
  <div id="hero">
    <div class="hero-left">
      <div class="hero-badge" id="hero-badge"></div>
      <h1 class="hero-headline" id="hero-headline"></h1>
      <div class="hero-role-wrap">
        <span class="role-slash">//</span>
        <span id="hero-role"></span>
      </div>
      <p class="hero-bio" id="hero-bio"></p>
      <div class="hero-actions" id="hero-actions"></div>
      <div class="hero-scroll">
        <div class="scroll-line"></div>
        <span>SCROLL TO EXPLORE</span>
      </div>
    </div>

    <div class="profile-stage">
      <div class="profile-3d" id="profile3d">
        <div class="profile-glass">
          <div class="corner-bl"></div>
          <div class="profile-img-wrap">
            <div class="profile-img-inner" id="profile-img-inner"></div>
          </div>
          <div class="profile-name-display">
            <div class="profile-name-big" id="profile-name-big"></div>
            <div class="profile-role-tag" id="profile-role-tag"></div>
          </div>
          <div class="profile-divider"></div>
          <div class="profile-meta" id="profile-meta"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
     STATS DASHBOARD
══════════════════════════════════════════════════════════ -->
  <section id="stats">
    <div class="section-wrap" style="padding-top:80px;padding-bottom:80px;">
      <div class="stats-strip" id="stats-strip"></div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════════
     TECH STACK
══════════════════════════════════════════════════════════ -->
  <section id="techstack">
    <div class="section-wrap">
      <div class="eyebrow">Tech Arsenal</div>
      <h2 class="section-title">STACK</h2>
      <div class="tech-filter-bar" id="tech-filter-bar">
        <button class="filter-btn active" data-cat="All">All</button>
      </div>
      <div class="tech-grid" id="tech-grid"></div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════════
     PROJECTS
══════════════════════════════════════════════════════════ -->
  <section id="projects">
    <div class="section-wrap">
      <div class="eyebrow">Selected Work</div>
      <h2 class="section-title">PROJECTS</h2>
      <div class="projects-layout" id="projects-layout"></div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════════
     TIMELINE
══════════════════════════════════════════════════════════ -->
  <section id="timeline">
    <div class="section-wrap">
      <div class="eyebrow">Career Path</div>
      <h2 class="section-title">TIMELINE</h2>
      <div class="timeline-rail" id="timeline-rail"></div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════════
     EDUCATION & CERTS
══════════════════════════════════════════════════════════ -->
  <section id="education">
    <div class="section-wrap">
      <div class="eyebrow">Credentials</div>
      <h2 class="section-title">EDUCATION</h2>
      <div class="edu-cert-grid">
        <div>
          <div class="subsection-head">Academic Background</div>
          <div id="education-list"></div>
        </div>
        <div>
          <div class="subsection-head">Certifications</div>
          <div class="cert-list" id="cert-list"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════════
     CONTACT
══════════════════════════════════════════════════════════ -->
  <section id="contact">
    <div class="section-wrap">
      <div class="contact-bg-text" id="contact-bg-text"></div>
      <div class="contact-inner">
        <div class="contact-title" id="contact-title"></div>
        <p class="contact-sub" id="contact-sub"></p>
        <a href="#" class="contact-cta-btn" id="contact-cta-btn"></a>
        <div class="contact-links" id="contact-links"></div>
      </div>
    </div>
  </section>

  <footer>
    <span id="footer-copy"></span>
    <!-- <span>Designed with precision. Built with obsession.</span> -->
  </footer>

  <script>
    // ────────────────────────────────────────────────────────────
    // RENDER ENGINE — reads from CONFIG object in config.js
    // ────────────────────────────────────────────────────────────
    const C = CONFIG;
    const $ = id => document.getElementById(id);
    const create = (tag, cls) => { const el = document.createElement(tag); if (cls) el.className = cls; return el; };

    // ── Cursor ──────────────────────────────────────────────────
    const cursor = $('cursor'), cursorRing = $('cursor-ring');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      setTimeout(() => {
        cursorRing.style.left = e.clientX + 'px';
        cursorRing.style.top = e.clientY + 'px';
      }, 80);
    });

    // ── 3D Card tilt ─────────────────────────────────────────────
    const card3d = $('profile3d');
    if (card3d) {
      card3d.parentElement.addEventListener('mousemove', e => {
        const rect = card3d.getBoundingClientRect();
        const x = (e.clientX - rect.left - rect.width / 2) / rect.width;
        const y = (e.clientY - rect.top - rect.height / 2) / rect.height;
        card3d.style.transform = `rotateY(${x * 14}deg) rotateX(${-y * 10}deg)`;
      });
      card3d.parentElement.addEventListener('mouseleave', () => {
        card3d.style.transform = 'rotateY(0deg) rotateX(0deg)';
      });
    }

    // ── HERO ─────────────────────────────────────────────────────
    const P = C.personal;
    document.title = P.name + ' — Portfolio';
    $('nav-logo').innerHTML = P.nameStyled[0] + '<em>.</em>' + P.nameStyled[1];

    $('hero-badge').innerHTML = P.available
      ? `<div class="badge-dot"></div> AVAILABLE FOR PROJECTS`
      : `OPEN TO OPPORTUNITIES`;

    $('hero-headline').innerHTML = `
  <span class="line-ghost">${P.nameStyled[0]}</span>
  <span class="line-solid">${P.nameStyled[1]}</span>
  <span class="line-accent">${P.role.toUpperCase()}</span>
`;

    $('hero-role').innerHTML = `<span>// </span>${P.tagline} <span>${P.taglineAccent}</span>`;
    $('hero-bio').textContent = P.bio;

    $('hero-actions').innerHTML = `
  <a href="#projects" class="btn-primary">View My Work ↓</a>
  <a href="${P.resumeUrl}" class="btn-outline">Download Resume ↗</a>
`;

    // Profile card
    $('profile-name-big').innerHTML = P.nameStyled[0] + ' <span>' + P.nameStyled[1] + '</span>';
    $('profile-role-tag').textContent = P.role.toUpperCase();

    const imgInner = $('profile-img-inner');
    imgInner.innerHTML = P.profileImage
      ? `<img src="${P.profileImage}" alt="${P.name}" onerror="this.parentElement.innerHTML='${P.profileFallbackEmoji}'">`
      : P.profileFallbackEmoji;

    $('profile-meta').innerHTML = `
  <div class="meta-chip"><div class="mc-label">Location</div><div class="mc-val">${P.location}</div></div>
  <div class="meta-chip"><div class="mc-label">Experience</div><div class="mc-val">${C.stats[0].value}${C.stats[0].suffix} Yrs</div></div>
  <div class="meta-chip"><div class="mc-label">Projects</div><div class="mc-val">${C.stats[1].value}${C.stats[1].suffix}</div></div>
  <div class="meta-chip"><div class="mc-label">Status</div><div class="mc-val">${P.available ? '🟢 Open' : '🔴 Busy'}</div></div>
`;

    // ── STATS ────────────────────────────────────────────────────
    const statColors = ['var(--cyan)', 'var(--orange)', 'var(--lime)', '#FF4081'];
    $('stats-strip').innerHTML = C.stats.map((s, i) => `
  <div class="stat-block fade-up" style="--stat-color:${statColors[i]}">
    <div class="stat-icon-wrap">${s.icon}</div>
    <div class="stat-number">${s.value}<span class="stat-accent">${s.suffix}</span></div>
    <div class="stat-label">${s.label}</div>
  </div>
`).join('');

    // ── TECH STACK ────────────────────────────────────────────────
    const cats = ['All', ...new Set(C.techStack.map(t => t.category))];
    const filterBar = $('tech-filter-bar');
    cats.forEach(cat => {
      if (cat === 'All') return; // already added
      const btn = create('button', 'filter-btn');
      btn.dataset.cat = cat;
      btn.textContent = cat;
      filterBar.appendChild(btn);
    });

    const techGrid = $('tech-grid');
    C.techStack.forEach(t => {
      const cell = create('div', 'tech-cell fade-up');
      cell.dataset.category = t.category;
      cell.style.setProperty('--glow-color', t.glowColor + '30');
      const isImg = /\.(png|jpe?g|svg|webp|gif)/i.test(t.icon);
      const iconHtml = isImg ? `<img src="${t.icon}" alt="${t.name}">` : t.icon;
      cell.innerHTML = `<div class="tech-icon">${iconHtml}</div><div class="tech-name">${t.name}</div>`;
      techGrid.appendChild(cell);
    });

    // Filter logic
    filterBar.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.cat;
      techGrid.querySelectorAll('.tech-cell').forEach(cell => {
        cell.classList.toggle('hidden', cat !== 'All' && cell.dataset.category !== cat);
      });
    });

    // ── PROJECTS ──────────────────────────────────────────────────
    const projectsLayout = $('projects-layout');
    C.projects.forEach(p => {
      const card = create('div', 'project-card fade-up' + (p.featured ? ' featured' : ''));
      card.style.setProperty('--card-accent', p.accentColor);
      card.innerHTML = `
    <div class="project-header">
      <div class="project-icon-box">${p.icon}</div>
      <div class="project-meta-top">
        <span class="project-year">${p.year}</span>
        <span class="project-tag">${p.tag}</span>
      </div>
    </div>
    <div class="project-title">${p.title.toUpperCase()}</div>
    <div class="qa-block">
      <div class="qa-label problem">↯ Problem</div>
      <div class="qa-text">${p.problem}</div>
      <div class="qa-label solution">✓ Solution</div>
      <div class="qa-text">${p.solution}</div>
    </div>
    <div class="project-footer">
      ${p.tech.map(t => `<span class="tech-pill">${t}</span>`).join('')}
    </div>
  `;
      projectsLayout.appendChild(card);
    });

    // ── TIMELINE ──────────────────────────────────────────────────
    const rail = $('timeline-rail');
    C.experience.forEach((e, i) => {
      const item = create('div', 'tl-item');
      item.innerHTML = `
    <div class="tl-node"></div>
    <div class="tl-period">${e.period} · ${e.type}</div>
    <div class="tl-role">${e.role.toUpperCase()}</div>
    <div class="tl-company">${e.company}</div>
    <div class="tl-desc">${e.description}</div>
    <div class="tl-milestones">
      ${e.milestones.map(m => `<div class="tl-ms">${m}</div>`).join('')}
    </div>
  `;
      rail.appendChild(item);
    });

    // ── EDUCATION ─────────────────────────────────────────────────
    $('education-list').innerHTML = C.education.map(e => `
  <div class="edu-card-glass fade-up">
    <div class="edu-degree-name">${e.degree.toUpperCase()}</div>
    <div class="edu-field-name">${e.field}</div>
    <div class="edu-attrs">
      <div class="edu-attr">🏛 <span>${e.institution}</span></div>
      <div class="edu-attr">📅 <span>${e.period}</span></div>
      <div class="edu-attr">⭐ <span>${e.grade}</span></div>
    </div>
  </div>
`).join('');

    $('cert-list').innerHTML = C.certifications.map(c => `
  <div class="cert-row fade-up">
    <div class="cert-icon-box" style="color:${c.color}">${c.icon}</div>
    <div class="cert-info">
      <div class="cert-title-text">${c.title}</div>
      <div class="cert-issuer-text">${c.issuer}</div>
    </div>
    <div class="cert-year-badge">${c.year}</div>
  </div>
`).join('');

    // ── CONTACT ───────────────────────────────────────────────────
    const ct = C.contact;
    $('contact-bg-text').textContent = 'HELLO';
    $('contact-title').innerHTML = `${ct.headline}<br><span class="cta-accent">${ct.headlineAccent}</span>`;
    $('contact-sub').textContent = ct.subtext;
    $('contact-cta-btn').textContent = ct.cta + ' ↗';
    $('contact-cta-btn').href = `mailto:${P.email}`;
    $('contact-links').innerHTML = `
  <a href="mailto:${P.email}" class="contact-link">✉ ${P.email}</a>
  <a href="${P.linkedin}" target="_blank" class="contact-link">in LinkedIn</a>
`;
    $('footer-copy').innerHTML = `© ${new Date().getFullYear()} <a href="#">${P.name}</a>`;

    // ── Intersection Observer (scroll reveals) ────────────────────
    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry, idx) => {
        if (entry.isIntersecting) {
          setTimeout(() => {
            entry.target.classList.add('visible');
            // Timeline specific
            if (entry.target.classList.contains('tl-item')) entry.target.classList.add('visible');
          }, idx * 90);
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

    document.querySelectorAll('.fade-up, .tl-item').forEach(el => io.observe(el));

    // Counter animation for stats
    const countIO = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const el = entry.target.querySelector('.stat-number');
        if (!el) return;
        const raw = el.textContent.replace(/[^0-9]/g, '');
        const num = parseInt(raw);
        if (isNaN(num)) return; // "∞" etc — skip
        let start = 0;
        const dur = 1400;
        const step = timestamp => {
          if (!start) start = timestamp;
          const progress = Math.min((timestamp - start) / dur, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          el.firstChild.textContent = Math.floor(eased * num);
          if (progress < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
        countIO.unobserve(entry.target);
      });
    }, { threshold: 0.5 });
    document.querySelectorAll('.stat-block').forEach(el => countIO.observe(el));
  </script>
</body>

</html>
